unbind r
bind r source-file ~/.tmux.conf

set -g prefix C-s
set -g mouse on
set -g default-terminal "tmux-256color"
set -g base-index 1
set -g renumber-windows on
set -g allow-rename off
set -g automatic-rename off
set -g allow-passthrough on
set -g history-limit 50000
set -g focus-events on
set -g status-interval 5

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind c new-window
bind t new-window
bind w display-popup -E -w 60% -h 60% -d '#{pane_current_path}' "$HOME/dotfiles/tmux/worktree-picker/worktree-picker"
bind n display-popup -E -w 80% -h 80% "tmux new-session -A -s scratch"
bind O display-popup -E -w 90% -h 80% "~/dotfiles/tmux/scripts/agent_overview.sh"
bind b display-popup -E -w 90% -h 90% "claude"
bind e display-popup -E -w 80% -h 80% "tmux new-session -A -s servers"
bind G display-popup -d "#{pane_current_path}" -xC -yC -w80% -h80% -E lazygit
bind F command-prompt -p "Feature name:" "send-keys '~/.claude/tmux-feature.sh \"%%\"' Enter"
bind D send-keys '~/.claude/tmux-feature-done.sh' Enter
bind X send-keys '~/.claude/tmux-feature-discard.sh' Enter
# Agent sidebar
set -g @plugin 'MiGrebin/tmux-agent-sidebar'
# File tree sidebar
set -g @treemux-tree-focus 'Tab'
set -g @treemux-tree 'BTab'
set -g @treemux-tree-client 'neo-tree'
set -g @treemux-tree-position 'right'
set -g @treemux-python-command '/opt/homebrew/bin/python3'
set -g @treemux-enable-debug-pane '0'
set -g @plugin 'MiGrebin/treemux'

set-option -g status-position top

# tmux-nova config
set -g @nova-nerdfonts true
set -g @nova-nerdfonts-left ""
set -g @nova-nerdfonts-right ""

# Colors (GitHub Dark)
set -g @nova-status-style-bg "#010409"
set -g @nova-status-style-fg "#6e7681"
set -g @nova-status-style-active-bg "#58a6ff"
set -g @nova-status-style-active-fg "#010409"
set -g @nova-pane-active-border-style "#58a6ff"
set -g @nova-pane-border-style "#30363d"
set -g @nova-pane "#I #W"

# Left segments
set -g @nova-segment-session "  #S"
set -g @nova-segment-session-colors "#3fb950 #010409"

# Right segments
set -g @nova-segment-whoami "  #(whoami)@#h"
set -g @nova-segment-whoami-colors "#21262d #b1bac4"

set -g @nova-segment-cpu "  #{cpu_percentage}"
set -g @nova-segment-cpu-colors "#21262d #e6edf3"

set -g @nova-segment-ram "  #{ram_percentage}"
set -g @nova-segment-ram-colors "#21262d #bc8cff"

set -g @nova-segment-battery "  #{battery_percentage}"
set -g @nova-segment-battery-colors "#21262d #3fb950"

set -g @nova-segment-uptime "  #(~/dotfiles/tmux/scripts/uptime.sh)"
set -g @nova-segment-uptime-colors "#21262d #b1bac4"

set -g @nova-segment-datetime "  %H:%M    %d.%m.%Y"
set -g @nova-segment-datetime-colors "#58a6ff #010409"

# Layout
set -g @nova-segments-0-left "session"
set -g @nova-segments-0-right "whoami cpu ram battery uptime datetime"

set -g status-right-length 200
set -g status-left-length 150

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'o0th/tmux-nova'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sessionist'

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'

# Override plugin settings (must be after TPM)
bind a run-shell -b '~/dotfiles/tmux/scripts/toggle_sidebar.sh'
