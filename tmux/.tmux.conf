unbind r
bind r source-file ~/.tmux.conf                       

set -g prefix C-s
set -g mouse on
set -g default-terminal "tmux-256color"
set -g base-index 1
set -g renumber-windows on
set -g allow-rename off
set -g automatic-rename off
set -g allow-passthrough on
set -g history-limit 50000
set -g focus-events on
set -g status-interval 5

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind c new-window
bind w display-popup -E -w 60% -h 60% -d '#{pane_current_path}' "$HOME/dotfiles/tmux/worktree-picker/worktree-picker"
bind n display-popup -E -w 80% -h 80% "tmux new-session -A -s scratch"
bind O display-popup -E -w 90% -h 80% "~/dotfiles/tmux/scripts/agent_overview.sh"

bind b display-popup -E -w 90% -h 90% "claude"
bind e display-popup -E -w 80% -h 80% "tmux new-session -A -s servers"

set-option -g status-position top

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W"

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 150
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @agent_notify_no_status "1"
set -g @agent_notify_interval "1"
set -g @plugin 'MiGrebin/tmux-agent-notify'
# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'

# Override plugin settings (must be after TPM)
bind a run-shell -b '~/dotfiles/tmux/scripts/toggle_sidebar.sh'
run-shell 'tmux set -g status-right "$(tmux show -gv status-right | sed "s/ *#{@agent_notify_status}//g")"'

